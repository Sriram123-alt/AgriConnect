version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: agriconnect_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/agriconnect_db?useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    ports:
      - "8080:8080"
    depends_on:
      - db

  farmer-app:
    build: ./farmer-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

  buyer-app:
    build: ./buyer-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

  admin-app:
    build: ./admin-frontend
    ports:
      - "3003:80"
    depends_on:
      - backend

  transport-app:
    build: ./transport-frontend
    ports:
      - "3004:80"
    depends_on:
      - backend

volumes:
  db_data:
